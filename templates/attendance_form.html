{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-plus-circle"></i> {{ t("attendance.add_title") }}
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">{{ t("attendance.student") }} <span class="text-danger">*</span></label>
                            <select name="student_id" class="form-select" required>
                                <option value="">{{ t("attendance.select_student") }}</option>
                                {% for s in students %}
                                <option value="{{ s.id }}">{{ s.name }} ({{ s.class_name }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ t("attendance.course") }} <span class="text-danger">*</span></label>
                            <select name="course_id" class="form-select" required>
                                <option value="">{{ t("attendance.select_course") }}</option>
                                {% for c in courses %}
                                <option value="{{ c.id }}">{{ c.course_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">{{ t("attendance.date") }} <span class="text-danger">*</span></label>
                            <input type="date" name="date" class="form-control" required
                                   value="{{ today }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ t("attendance.status") }} <span class="text-danger">*</span></label>
                            <select name="status" class="form-select" required>
                                <option value="出勤">{{ t("attendance.present") }}</option>
                                <option value="迟到">{{ t("attendance.late") }}</option>
                                <option value="缺勤">{{ t("attendance.absent") }}</option>
                                <option value="请假">{{ t("attendance.leave") }}</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t("attendance.remark") }}</label>
                        <textarea name="remark" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('attendance') }}" class="btn btn-secondary">{{ t("attendance.back") }}</a>
                        <button type="submit" class="btn btn-primary">{{ t("add") }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
