{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi {{ 'bi-pencil' if teacher else 'bi-person-plus' }}"></i>
                {{ "编辑教师" if teacher else "添加教师" }}
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">工号 <span class="text-danger">*</span></label>
                            <input type="text" name="teacher_id" class="form-control" required
                                   value="{{ teacher.teacher_id if teacher else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required
                                   value="{{ teacher.name if teacher else '' }}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">性别</label>
                            <select name="gender" class="form-select">
                                <option value="男" {{ "selected" if teacher and teacher.gender == "男" else "" }}>男</option>
                                <option value="女" {{ "selected" if teacher and teacher.gender == "女" else "" }}>女</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">任教科目 <span class="text-danger">*</span></label>
                            <input type="text" name="subject" class="form-control" required
                                   value="{{ teacher.subject if teacher else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">电话</label>
                            <input type="text" name="phone" class="form-control"
                                   value="{{ teacher.phone if teacher else '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ teacher.email if teacher else '' }}">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('teachers') }}" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-success">
                            {{ "保存修改" if teacher else "添加教师" }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
