{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-book"></i> 课程管理</h4>
    <a href="{{ url_for('course_add') }}" class="btn btn-info text-white">
        <i class="bi bi-book-plus"></i> 添加课程
    </a>
</div>

<div class="card">
    <div class="card-body">
        {% if courses %}
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>课程名称</th>
                        <th>授课教师</th>
                        <th>上课时间</th>
                        <th>教室</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in courses %}
                    <tr>
                        <td>{{ c.id }}</td>
                        <td>{{ c.course_name }}</td>
                        <td>{{ teachers.get(c.teacher_id, "未知") }}</td>
                        <td>{{ c.schedule }}</td>
                        <td>{{ c.classroom }}</td>
                        <td>
                            <a href="{{ url_for('course_edit', course_id=c.id) }}" class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i> 编辑
                            </a>
                            <a href="{{ url_for('course_delete', course_id=c.id) }}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('确定要删除课程 {{ c.course_name }} 吗？')">
                                <i class="bi bi-trash"></i> 删除
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <p class="text-muted text-center my-4">暂无课程数据</p>
        {% endif %}
    </div>
</div>
{% endblock %}
