{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi {{ 'bi-pencil' if course else 'bi-book-plus' }}"></i>
                {{ "编辑课程" if course else "添加课程" }}
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">课程名称 <span class="text-danger">*</span></label>
                        <input type="text" name="course_name" class="form-control" required
                               value="{{ course.course_name if course else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">授课教师 <span class="text-danger">*</span></label>
                        <select name="teacher_id" class="form-select" required>
                            <option value="">请选择教师</option>
                            {% for t in teachers %}
                            <option value="{{ t.id }}" {{ "selected" if course and course.teacher_id == t.id else "" }}>
                                {{ t.name }} ({{ t.subject }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">上课时间</label>
                            <input type="text" name="schedule" class="form-control"
                                   placeholder="如：周一 上午 8:00-9:40"
                                   value="{{ course.schedule if course else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">教室</label>
                            <input type="text" name="classroom" class="form-control"
                                   value="{{ course.classroom if course else '' }}">
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('courses') }}" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-info text-white">
                            {{ "保存修改" if course else "添加课程" }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
