{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi {{ 'bi-pencil' if course else 'bi-book-plus' }}"></i>
                {{ t("course.edit_title") if course else t("course.add_title") }}
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">{{ t("course.course_name") }} <span class="text-danger">*</span></label>
                        <input type="text" name="course_name" class="form-control" required
                               value="{{ course.course_name if course else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t("course.teacher") }} <span class="text-danger">*</span></label>
                        <select name="teacher_id" class="form-select" required>
                            <option value="">{{ t("course.select_teacher") }}</option>
                            {% for t in teachers %}
                            <option value="{{ t.id }}" {{ "selected" if course and course.teacher_id == t.id else "" }}>
                                {{ t.name }} ({{ t.subject }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">{{ t("course.schedule") }}</label>
                            <input type="text" name="schedule" class="form-control"
                                   placeholder="{{ t('course.schedule') }}"
                                   value="{{ course.schedule if course else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ t("course.classroom") }}</label>
                            <input type="text" name="classroom" class="form-control"
                                   value="{{ course.classroom if course else '' }}">
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('courses') }}" class="btn btn-secondary">{{ t("course.back") }}</a>
                        <button type="submit" class="btn btn-info text-white">
                            {{ t("course.save") if course else t("course.add") }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
