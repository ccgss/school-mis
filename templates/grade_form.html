{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-plus-circle"></i> {{ t("grade.add_title") }}
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">{{ t("grade.student") }} <span class="text-danger">*</span></label>
                            <select name="student_id" class="form-select" required>
                                <option value="">{{ t("grade.select_student") }}</option>
                                {% for s in students %}
                                <option value="{{ s.id }}">{{ s.name }} ({{ s.class_name }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ t("grade.course") }} <span class="text-danger">*</span></label>
                            <select name="course_id" class="form-select" required>
                                <option value="">{{ t("grade.select_course") }}</option>
                                {% for c in courses %}
                                <option value="{{ c.id }}">{{ c.course_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">{{ t("grade.score") }} <span class="text-danger">*</span></label>
                            <input type="number" name="score" class="form-control" min="0" max="100" step="0.5" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">{{ t("grade.exam_type") }}</label>
                            <select name="exam_type" class="form-select">
                                <option value="小测">{{ t("exam.quiz") }}</option>
                                <option value="期中" selected>{{ t("exam.midterm") }}</option>
                                <option value="期末">{{ t("exam.final") }}</option>
                                <option value="补考">{{ t("exam.makeup") }}</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">{{ t("grade.semester") }}</label>
                            <input type="text" name="semester" class="form-control" placeholder="e.g. 2025-2026 Sem 1">
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('grades') }}" class="btn btn-secondary">{{ t("grade.back") }}</a>
                        <button type="submit" class="btn btn-warning">{{ t("add") }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
