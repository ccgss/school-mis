{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-plus-circle"></i> 录入成绩
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">学生 <span class="text-danger">*</span></label>
                            <select name="student_id" class="form-select" required>
                                <option value="">请选择学生</option>
                                {% for s in students %}
                                <option value="{{ s.id }}">{{ s.name }} ({{ s.class_name }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">课程 <span class="text-danger">*</span></label>
                            <select name="course_id" class="form-select" required>
                                <option value="">请选择课程</option>
                                {% for c in courses %}
                                <option value="{{ c.id }}">{{ c.course_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">成绩 <span class="text-danger">*</span></label>
                            <input type="number" name="score" class="form-control" min="0" max="100" step="0.5" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">考试类型</label>
                            <select name="exam_type" class="form-select">
                                <option value="小测">小测</option>
                                <option value="期中" selected>期中</option>
                                <option value="期末">期末</option>
                                <option value="补考">补考</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">学期</label>
                            <input type="text" name="semester" class="form-control" placeholder="如：2025-2026第一学期">
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('grades') }}" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-warning">录入成绩</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
