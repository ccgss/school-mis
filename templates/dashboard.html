{% extends "base.html" %}
{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h3><i class="bi bi-speedometer2"></i> 系统仪表盘</h3>
        <p class="text-muted">欢迎使用学校管理系统，以下是系统概况</p>
    </div>
</div>

<div class="row g-4">
    <div class="col-md-3">
        <div class="stat-card" style="background: linear-gradient(135deg, #667eea, #764ba2);">
            <i class="bi bi-people"></i>
            <div class="number">{{ stats.student_count }}</div>
            <div class="label">学生总数</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
            <i class="bi bi-person-badge"></i>
            <div class="number">{{ stats.teacher_count }}</div>
            <div class="label">教师总数</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
            <i class="bi bi-book"></i>
            <div class="number">{{ stats.course_count }}</div>
            <div class="label">课程总数</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="stat-card" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
            <i class="bi bi-trophy"></i>
            <div class="number">{{ stats.grade_count }}</div>
            <div class="label">成绩记录</div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-lightbulb"></i> 快速操作
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <a href="{{ url_for('student_add') }}" class="btn btn-primary w-100">
                            <i class="bi bi-person-plus"></i> 添加学生
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a href="{{ url_for('teacher_add') }}" class="btn btn-success w-100">
                            <i class="bi bi-person-plus"></i> 添加教师
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a href="{{ url_for('course_add') }}" class="btn btn-info w-100">
                            <i class="bi bi-book-plus"></i> 添加课程
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a href="{{ url_for('grade_add') }}" class="btn btn-warning w-100">
                            <i class="bi bi-plus-circle"></i> 录入成绩
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
