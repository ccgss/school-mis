{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi {{ 'bi-pencil' if student else 'bi-person-plus' }}"></i>
                {{ t("student.edit_title") if student else t("student.add_title") }}
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">{{ t("student.id") }} <span class="text-danger">*</span></label>
                            <input type="text" name="student_id" class="form-control" required
                                   value="{{ student.student_id if student else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ t("student.name") }} <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required
                                   value="{{ student.name if student else '' }}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">{{ t("student.gender") }} <span class="text-danger">*</span></label>
                            <select name="gender" class="form-select">
                                <option value="男" {{ "selected" if student and student.gender == "男" else "" }}>{{ t("student.male") }}</option>
                                <option value="女" {{ "selected" if student and student.gender == "女" else "" }}>{{ t("student.female") }}</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">{{ t("student.class") }} <span class="text-danger">*</span></label>
                            <input type="text" name="class_name" class="form-control" required
                                   value="{{ student.class_name if student else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">{{ t("student.phone") }}</label>
                            <input type="text" name="phone" class="form-control"
                                   value="{{ student.phone if student else '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t("student.email") }}</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ student.email if student else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ t("student.address") }}</label>
                        <textarea name="address" class="form-control" rows="2">{{ student.address if student else '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('students') }}" class="btn btn-secondary">{{ t("student.back") }}</a>
                        <button type="submit" class="btn btn-primary">
                            {{ t("student.save") if student else t("student.add") }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
