{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi {{ 'bi-pencil' if student else 'bi-person-plus' }}"></i>
                {{ "编辑学生" if student else "添加学生" }}
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">学号 <span class="text-danger">*</span></label>
                            <input type="text" name="student_id" class="form-control" required
                                   value="{{ student.student_id if student else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required
                                   value="{{ student.name if student else '' }}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">性别 <span class="text-danger">*</span></label>
                            <select name="gender" class="form-select">
                                <option value="男" {{ "selected" if student and student.gender == "男" else "" }}>男</option>
                                <option value="女" {{ "selected" if student and student.gender == "女" else "" }}>女</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">班级 <span class="text-danger">*</span></label>
                            <input type="text" name="class_name" class="form-control" required
                                   value="{{ student.class_name if student else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">电话</label>
                            <input type="text" name="phone" class="form-control"
                                   value="{{ student.phone if student else '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ student.email if student else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">家庭住址</label>
                        <textarea name="address" class="form-control" rows="2">{{ student.address if student else '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('students') }}" class="btn btn-secondary">返回</a>
                        <button type="submit" class="btn btn-primary">
                            {{ "保存修改" if student else "添加学生" }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
